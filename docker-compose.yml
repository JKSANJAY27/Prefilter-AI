version: '3.8'

services:
  prefilter-platform:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prefilter_platform_app
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional local integration databases for testing connectors
  mongodb:
    image: mongo:latest
    container_name: prefilter_mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=prefilter_db

  postgres:
    image: postgres:15-alpine
    container_name: prefilter_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=prefilter
      - POSTGRES_PASSWORD=prefilter_pass
      - POSTGRES_DB=prefilter_db
